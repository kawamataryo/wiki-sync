name: Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build
        run: npm run build
        
      - name: Update major version tag
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          
          # Get the tag name from the release
          TAG_NAME=${GITHUB_REF#refs/tags/}
          MAJOR_VERSION=$(echo $TAG_NAME | cut -d. -f1)
          
          # Update the major version tag
          git tag -fa $MAJOR_VERSION -m "Update major version tag"
          git push origin $MAJOR_VERSION --force
          
      - name: Create release assets
        run: |
          zip -r wiki-sync-action.zip dist/ action.yml README.md LICENSE
          
      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./wiki-sync-action.zip
          asset_name: wiki-sync-action.zip
          asset_content_type: application/zip